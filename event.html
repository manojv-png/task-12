<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
        }
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<h2>Student Details Table</h2>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Department</th>
        <th>Year</th>
    </tr>
    <tr>
        <td>101</td>
        <td>Rahul</td>
        <td>AI & ML</td>
        <td>III</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Anitha</td>
        <td>Computer Science</td>
        <td>II</td>
    </tr>
</table>

</body>
</html>
